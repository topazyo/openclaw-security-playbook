apiVersion: 1

datasources:
  - name: "OpenClaw Metrics (Prometheus)"
    type: "prometheus"
    access: "proxy"
    url: "http://prometheus:9090"
    jsonData:
      httpMethod: "POST"
      queryTimeout: "60s"
      timeInterval: "15s"
      prometheusType: "prometheus"
      prometheusVersion: "2.45.0"
      cacheLevel: "medium"
      incrementalQuerying: true
    isDefault: true
    editable: false
    orgId: 1
    version: 1
