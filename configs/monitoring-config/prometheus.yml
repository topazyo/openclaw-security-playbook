# Local Prometheus configuration for the self-contained ClawdBot compose stack.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "openclaw-local"
    environment: "compose"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "clawdbot-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["clawdbot-gateway:8443"]
        labels:
          service: "gateway"

  - job_name: "clawdbot-agent"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["clawdbot-agent:8000"]
        labels:
          service: "agent"

  - job_name: "grafana"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
