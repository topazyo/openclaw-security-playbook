title: OpenClaw MCP Server Path Traversal Attempt
id: f1a8b328-1d8e-4f72-8f91-2e9ec7d4a301
status: experimental
description: >
  Detects HTTP requests against MCP file download endpoints that include
  directory traversal fragments. This aligns to scenario 003 where a vulnerable
  community MCP server exposes sensitive ClawdBot files via ../../ sequences.
references:
  - https://github.com/topazyo/openclaw-security-playbook
author: openclaw-security-playbook
date: 2026-03-14
tags:
  - attack.initial-access
  - attack.t1190
  - attack.t1006
logsource:
  category: webserver
  product: linux
detection:
  selection_endpoint:
    RequestPath: '/api/download'
  selection_query_traversal: # FIX: C5-H-03
    QueryString|contains: # FIX: C5-H-03
      - '../' # FIX: C5-H-03 — literal Unix traversal
      - '..\' # FIX: C5-H-03 — literal Windows traversal
      - '%2e%2e/' # FIX: C5-H-03 — dot-dot encoded, slash literal (lower)
      - '%2E%2E/' # FIX: C5-H-03 — dot-dot encoded, slash literal (upper)
      - '%2e%2e%2f' # FIX: C5-H-03 — dot-dot and slash both encoded (lower)
      - '%2E%2E%2F' # FIX: C5-H-03 — dot-dot and slash both encoded (upper)
      - '..%2f' # FIX: C5-H-03 — slash encoded only (lower)
      - '..%2F' # FIX: C5-H-03 — slash encoded only (upper)
      - '%2e%2e%5c' # FIX: C5-H-03 — dot-dot encoded, backslash encoded (lower)
      - '%2E%2E%5C' # FIX: C5-H-03 — dot-dot encoded, backslash encoded (upper)
      - '..%5c' # FIX: C5-H-03 — backslash encoded only (lower)
      - '..%5C' # FIX: C5-H-03 — backslash encoded only (upper)
      - '%252e%252e%252f' # FIX: C6-M-01 - double-encoded dot-dot-slash (lower)
      - '%252E%252E%252F' # FIX: C6-M-01 - double-encoded dot-dot-slash (upper)
      - '%252e%252e/' # FIX: C6-M-01 - double-encoded dots, literal slash (lower)
      - '%252E%252E/' # FIX: C6-M-01 - double-encoded dots, literal slash (upper)
      - '．．/' # FIX: C6-M-01 - Unicode fullwidth dots (U+FF0E) with literal slash
      - '%c0%ae%c0%ae/' # FIX: C6-M-01 - overlong UTF-8 encoded dots (lower)
      - '%C0%AE%C0%AE/' # FIX: C6-M-01 - overlong UTF-8 encoded dots (upper)
  condition: selection_endpoint and selection_query_traversal # FIX: C5-H-03
falsepositives:
  - Security testing against a staging MCP server
level: critical
