title: OpenClaw Agent Impersonation via Webhook Skill
id: 2a1dc58f-ff1d-43f5-a7ec-bad93cf4cf02
status: experimental
description: >
  Detects an agent webhook skill posting directly to an internal queue endpoint
  with payload fragments that impersonate the approval agent and request admin
  user creation. This matches the scenario 004 multi-agent coordination attack.
references:
  - https://github.com/topazyo/openclaw-security-playbook
author: openclaw-security-playbook
date: 2026-03-14
tags:
  - attack.privilege-escalation
  - attack.t1068
  - attack.t1136
logsource:
  category: application
  product: linux
detection:
  selection_skill:
    SkillName: "webhook_sender"
  selection_target:
    Url|contains: "internal-rabbitmq.clawdbot.local:15672/api/queues/admin-agent-queue/publish"
  selection_payload_from: # FIX: C5-H-06
    RequestBody|contains: # FIX: C5-H-06
      - '"from":"approval-agent-01"' # FIX: C5-H-06 (minified)
      - '"from": "approval-agent-01"' # FIX: C5-H-06 (1-space pretty-print)
      - '"from":  "approval-agent-01"' # FIX: C5-H-06 (2-space pretty-print, e.g., PowerShell)
      - '"from" : "approval-agent-01"' # FIX: C5-H-06 (space-before-colon)
      - "\"from\":\t\"approval-agent-01\"" # FIX: C5-H-06 (tab-separated)
      - "\"from\":\n\"approval-agent-01\"" # FIX: C5-H-06 (newline-separated)
  selection_payload_action: # FIX: C5-H-06
    RequestBody|contains: # FIX: C5-H-06
      - '"action":"create_admin_user"' # FIX: C5-H-06 (minified)
      - '"action": "create_admin_user"' # FIX: C5-H-06 (1-space pretty-print)
      - '"action":  "create_admin_user"' # FIX: C5-H-06 (2-space pretty-print, e.g., PowerShell)
      - '"action" : "create_admin_user"' # FIX: C5-H-06 (space-before-colon)
      - "\"action\":\t\"create_admin_user\"" # FIX: C5-H-06 (tab-separated)
      - "\"action\":\n\"create_admin_user\"" # FIX: C5-H-06 (newline-separated)
  condition: selection_skill and selection_target and selection_payload_from and selection_payload_action # FIX: C5-H-06
falsepositives:
  - Approved integration testing that publishes signed administrative queue messages
level: critical
