title: OpenClaw Runtime Hardening Drift in Container Launch
id: 7f2d6b43-9a23-4f1e-9309-4b53c1a6d202
status: experimental
description: >
  Detects docker run invocations for OpenClaw/Clawdbot/Moltbot that omit
  required hardening flags such as read-only rootfs, no-new-privileges,
  non-root user, and cap-drop ALL.
references:
  - https://github.com/topazyo/openclaw-security-playbook
author: openclaw-security-playbook
date: 2026-02-21
tags:
  - attack.defense-evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: linux
detection:
  selection_docker_run:
    Image|endswith:
      - "/docker"
    CommandLine|contains|all:
      - "docker run"
  selection_target_workload:
    CommandLine|contains:
      - "openclaw"
      - "clawdbot"
      - "moltbot"
  filter_cap_drop: # FIX: C5-H-04
    CommandLine|contains: # FIX: C5-H-04
      - "--cap-drop ALL" # FIX: C5-H-04
      - "--cap-drop=ALL" # FIX: C5-H-04
  filter_read_only: # FIX: C5-H-04
    CommandLine|contains: "--read-only" # FIX: C5-H-04
  filter_user: # FIX: C5-H-04
    CommandLine|contains: # FIX: C5-H-04
      - "--user 1000:1000" # FIX: C5-H-04
      - "--user=1000:1000" # FIX: C5-H-04
  filter_no_new_priv: # FIX: C5-H-04
    CommandLine|contains: # FIX: C5-H-04
      - "--security-opt no-new-privileges:true" # FIX: C5-H-04
      - "--security-opt=no-new-privileges:true" # FIX: C5-H-04
  selection_negated_hardening: # FIX: C6-H-02
    CommandLine|contains: # FIX: C6-H-02
      - "--read-only=false" # FIX: C6-H-02
      - "--read-only false" # FIX: C6-H-02
      - "--cap-add SYS_ADMIN" # FIX: C6-H-02
      - "--cap-add=SYS_ADMIN" # FIX: C6-H-02
      - "--cap-add ALL" # FIX: C6-H-02
      - "--cap-add=ALL" # FIX: C6-H-02
      - "--security-opt no-new-privileges:false" # FIX: C6-H-02
      - "--security-opt=no-new-privileges:false" # FIX: C6-H-02
      - "--user 0:0" # FIX: C6-H-02
      - "--user=0:0" # FIX: C6-H-02
      - "--user root" # FIX: C6-H-02
      - "--user=root" # FIX: C6-H-02
      - "--privileged" # FIX: C6-H-02
  condition: selection_docker_run and selection_target_workload and (not (filter_cap_drop and filter_read_only and filter_user and filter_no_new_priv) or selection_negated_hardening) # FIX: C6-H-02
falsepositives:
  - Local development containers intentionally launched without hardening flags
level: high
