name: Compliance Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "configs/**"
      - "docs/policies/**"
      - "configs/organization-policies/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  policy-validation:
    name: Validate Security Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate SEC-002 (Data Classification)
        run: |
          python tools/policy-validator.py --policy SEC-002

      - name: Validate SEC-003 (Vulnerability Management)
        run: |
          python tools/policy-validator.py --policy SEC-003

      - name: Validate SEC-004 (Access Control)
        run: |
          python tools/policy-validator.py --policy SEC-004

      - name: Validate SEC-005 (Incident Response)
        run: |
          python tools/policy-validator.py --policy SEC-005

  config-syntax:
    name: Configuration Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: |
          pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml configs/

      - name: Validate agent config
        run: |
          python -c "import yaml; yaml.safe_load(open('configs/templates/clawdbot.secure.yml'))"

      - name: Validate MCP server config
        run: |
          python -c "import yaml; yaml.safe_load(open('configs/templates/gateway.hardened.yml'))"

  security-tests:
    name: Run Security Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov

      - name: Run policy compliance tests
        run: |
          pytest tests/security/test_policy_compliance.py --junit-xml=test-results-policy.xml -v

      - name: Run vulnerability scanning tests
        run: |
          pytest tests/security/test_vulnerability_scanning.py --junit-xml=test-results-vuln.xml -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results-*.xml
          retention-days: 30

  compliance-report:
    name: Generate Compliance Report
    runs-on: ubuntu-latest
    needs: [policy-validation, security-tests]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate SOC 2 report
        run: |
          python tools/compliance-reporter.py --framework SOC2 --output soc2-report.json

      - name: Generate ISO 27001 report
        run: |
          python tools/compliance-reporter.py --framework ISO27001 --output iso27001-report.json

      - name: Upload compliance reports
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports
          path: |
            soc2-report.json
            iso27001-report.json
          retention-days: 365

      - name: Calculate compliance percentage
        id: compliance
        run: |
          python << 'EOF'
          import json
          import sys
          import os

          # Check for SOC2 report
          if not os.path.exists('soc2-report.json'):
            print("❌ Error: soc2-report.json not found", file=sys.stderr)
            sys.exit(1)

          try:
            with open('soc2-report.json') as f:
              soc2_report = json.load(f)
            soc2_percentage = soc2_report.get('compliance_percentage')
            if soc2_percentage is None:
              print("❌ Error: 'compliance_percentage' key not found in soc2-report.json", file=sys.stderr)
              sys.exit(1)
          except json.JSONDecodeError as e:
            print(f"❌ Error: Invalid JSON in soc2-report.json: {e}", file=sys.stderr)
            sys.exit(1)

          # Check for ISO27001 report
          if not os.path.exists('iso27001-report.json'):
            print("❌ Error: iso27001-report.json not found", file=sys.stderr)
            sys.exit(1)

          try:
            with open('iso27001-report.json') as f:
              iso_report = json.load(f)
            iso27001_percentage = iso_report.get('compliance_percentage')
            if iso27001_percentage is None:
              print("❌ Error: 'compliance_percentage' key not found in iso27001-report.json", file=sys.stderr)
              sys.exit(1)
          except json.JSONDecodeError as e:
            print(f"❌ Error: Invalid JSON in iso27001-report.json: {e}", file=sys.stderr)
            sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"soc2_percentage={soc2_percentage}\n")
            f.write(f"iso27001_percentage={iso27001_percentage}\n")
          EOF

      - name: Comment compliance status on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 📋 Compliance Check Results\n\n';

            // SOC 2 report
            const soc2 = JSON.parse(fs.readFileSync('soc2-report.json', 'utf8'));
            comment += `### SOC 2 Type II\n`;
            comment += `- **Compliance**: ${soc2.compliance_percentage}%\n`;
            comment += `- **Implemented**: ${soc2.implemented_count}/${soc2.implemented_count + soc2.pending_count} controls\n`;
            if (soc2.pending_count > 0) {
              comment += `- ⚠️ **${soc2.pending_count}** controls pending\n`;
            } else {
              comment += `- ✅ All controls implemented\n`;
            }
            comment += '\n';

            // ISO 27001 report
            const iso = JSON.parse(fs.readFileSync('iso27001-report.json', 'utf8'));
            comment += `### ISO 27001:2022\n`;
            comment += `- **Compliance**: ${iso.compliance_percentage}%\n`;
            comment += `- **Implemented**: ${iso.implemented_count}/${iso.implemented_count + iso.pending_count} controls\n`;
            if (iso.pending_count > 0) {
              comment += `- ⚠️ **${iso.pending_count}** controls pending\n`;
            } else {
              comment += `- ✅ All controls implemented\n`;
            }

            comment += '\n---\n';
            comment += '📊 [View detailed reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Fail if compliance below 95%
        run: |
          python << 'EOF'  # FIX: C5-H-10
          import sys  # FIX: C5-H-10
          import os  # FIX: C5-H-10

          soc2_raw = "${{ steps.compliance.outputs.soc2_percentage }}"  # FIX: C5-H-10
          iso27001_raw = "${{ steps.compliance.outputs.iso27001_percentage }}"  # FIX: C5-H-10

          def parse_percentage(value, name):  # FIX: C5-H-10
              if not value:  # FIX: C5-H-10
                  print(f"❌ Error: {name} output is missing or empty", file=sys.stderr)  # FIX: C5-H-10
                  sys.exit(1)  # FIX: C5-H-10
              try:  # FIX: C5-H-10
                  return float(value)  # FIX: C5-H-10
              except ValueError:  # FIX: C5-H-10
                  print(f"❌ Error: {name} is non-numeric (got: '{value}')", file=sys.stderr)  # FIX: C5-H-10
                  sys.exit(1)  # FIX: C5-H-10

          soc2 = parse_percentage(soc2_raw, "soc2_percentage")  # FIX: C5-H-10
          iso27001 = parse_percentage(iso27001_raw, "iso27001_percentage")  # FIX: C5-H-10

          failed = False  # FIX: C5-H-10
          if soc2 < 95:  # FIX: C5-H-10
              print(f"❌ SOC2 below 95% (got {soc2}%)")  # FIX: C5-H-10
              failed = True  # FIX: C5-H-10
          if iso27001 < 95:  # FIX: C5-H-10
              print(f"❌ ISO27001 below 95% (got {iso27001}%)")  # FIX: C5-H-10
              failed = True  # FIX: C5-H-10
          if not failed:  # FIX: C5-H-10
              print(f"✅ SOC2 ({soc2}%) and ISO27001 ({iso27001}%) both meet the 95% threshold")  # FIX: C5-H-10
          else:  # FIX: C5-H-10
              sys.exit(1)  # FIX: C5-H-10
          # FIX: C6-H-06: terminator must be bare EOF with no trailing content so bash closes the heredoc
          EOF
